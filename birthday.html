<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #e8637a;
    --blush: #f4b8c4;
    --cream: #fff8f0;
    --gold: #c9973a;
    --sage: #8aab8a;
    --lavender: #c5aede;
    --deep: #3d1f2b;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--rose), var(--blush));
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    mix-blend-mode: multiply;
  }

  /* Background petals rain */
  .petal-rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    top: -60px;
    border-radius: 150% 0 150% 0;
    opacity: 0;
    animation: petalFall linear infinite;
  }

  @keyframes petalFall {
    0%   { transform: translateY(0) rotateZ(0deg) rotateX(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotateZ(720deg) rotateX(360deg); opacity: 0; }
  }

  /* Main card wrapper */
  .scene {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* The card itself */
  .card {
    background: linear-gradient(160deg, #fff9f5 0%, #fff0f5 50%, #fdf5ff 100%);
    border-radius: 4px;
    max-width: 700px;
    width: 100%;
    box-shadow:
      0 0 0 1px rgba(201,151,58,0.15),
      0 4px 6px rgba(61,31,43,0.05),
      0 20px 60px rgba(61,31,43,0.12),
      0 80px 120px rgba(61,31,43,0.08);
    position: relative;
    overflow: hidden;
    animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    transform: translateY(60px) scale(0.95);
    opacity: 0;
  }

  @keyframes cardReveal {
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* Gold border frame */
  .card::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(201,151,58,0.3);
    border-radius: 2px;
    pointer-events: none;
    z-index: 10;
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 50px;
    height: 50px;
    z-index: 11;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 8px; left: 8px; }
  .corner-tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .corner-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .corner-br { bottom: 8px; right: 8px; transform: scale(-1, -1); }

  /* Flower arch at top */
  .flower-arch {
    width: 100%;
    position: relative;
    height: 220px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }

  .arch-svg {
    position: absolute;
    bottom: 0;
    width: 110%;
    left: -5%;
    animation: archReveal 1.5s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes archReveal {
    from { transform: translateY(40px) scale(0.95); opacity: 0; }
    to   { transform: translateY(0)    scale(1);    opacity: 1; }
  }

  /* Card body */
  .card-body {
    padding: 30px 60px 50px;
    text-align: center;
    position: relative;
  }

  .greeting {
    font-family: 'Playfair Display', serif;
    font-size: clamp(14px, 3vw, 16px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 400;
    animation: fadeUp 0.8s 0.8s both;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 9vw, 72px);
    font-style: italic;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--rose) 0%, var(--gold) 50%, var(--rose) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 8px 0 4px;
    animation: fadeUp 0.8s 1s both;
    text-shadow: none;
  }

  .birthday-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 5vw, 42px);
    font-style: italic;
    color: var(--deep);
    font-weight: 400;
    letter-spacing: 0.04em;
    animation: fadeUp 0.8s 1.1s both;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
    animation: fadeUp 0.8s 1.2s both;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,151,58,0.4), transparent);
  }
  .divider-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.6;
  }

  .message {
    font-size: clamp(15px, 2.5vw, 18px);
    color: #7a4a55;
    line-height: 1.9;
    font-style: italic;
    font-weight: 300;
    max-width: 480px;
    margin: 0 auto;
    animation: fadeUp 0.8s 1.3s both;
  }

  /* Bottom flower bar */
  .flower-bottom {
    width: 100%;
    height: 120px;
    position: relative;
    overflow: hidden;
    margin-top: 20px;
  }

  /* Confetti burst on click */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: confettiBurst 1s ease-out forwards;
    z-index: 9998;
  }

  @keyframes confettiBurst {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(720deg); opacity: 0; }
  }

  /* Floating hearts */
  .hearts-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .heart {
    position: absolute;
    font-size: 12px;
    animation: heartFloat linear infinite;
    opacity: 0;
  }

  @keyframes heartFloat {
    0%   { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 0; }
    20%  { opacity: 0.5; }
    80%  { opacity: 0.3; }
    100% { transform: translateY(-300px) scale(1) rotate(10deg); opacity: 0; }
  }

  @keyframes fadeUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* Sparkle stars */
  .sparkle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--gold);
    border-radius: 50%;
    animation: sparkleAnim 2s infinite;
    box-shadow: 0 0 6px 2px rgba(201,151,58,0.6);
  }

  @keyframes sparkleAnim {
    0%, 100% { transform: scale(0) rotate(0deg); opacity: 0; }
    50%       { transform: scale(1) rotate(180deg); opacity: 1; }
  }

  /* Candle glow */
  .candle-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin: 20px 0 0;
    animation: fadeUp 0.8s 1.4s both;
  }

  .candle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .flame {
    width: 8px;
    height: 14px;
    background: linear-gradient(to top, #ff9500, #ffdd00, white);
    border-radius: 50% 50% 30% 30%;
    animation: flicker 0.3s ease-in-out infinite alternate;
    box-shadow: 0 0 8px 4px rgba(255,200,50,0.4);
  }

  @keyframes flicker {
    0%   { transform: scaleX(1) scaleY(1) rotate(-2deg); }
    100% { transform: scaleX(0.85) scaleY(1.1) rotate(2deg); }
  }

  .candle-stick {
    width: 8px;
    height: 32px;
    border-radius: 3px 3px 1px 1px;
    position: relative;
  }

  .candle-drip {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    border-radius: 0 0 50% 50%;
    opacity: 0.7;
  }

  /* Footer */
  .card-footer {
    text-align: center;
    padding: 0 60px 28px;
    animation: fadeUp 0.8s 1.5s both;
  }

  .footer-text {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(201,151,58,0.7);
    text-transform: uppercase;
  }

  /* Petal scatter on load */
  @keyframes petalPop {
    0%   { transform: scale(0) rotate(0deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(-15deg); opacity: 1; }
    100% { transform: scale(1) rotate(-8deg); opacity: 1; }
  }

  .scatter-petal {
    position: absolute;
    animation: petalPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
</style>
</head>

    <!-- Snakes at the bottom -->
    <div style="width:100%;position:relative;height:90px;overflow:hidden;background:linear-gradient(to top, #e8f5e0 0%, #f0fae8 60%, transparent 100%);">
      <svg viewBox="0 0 700 90" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
        <!-- Snake 1 - green, slithering left to right -->
        <g id="snake1">
          <path d="M-60,70 Q-20,45 20,70 Q60,95 100,70 Q140,45 180,70 Q220,95 260,70 Q300,45 340,70"

          <path d="M-60,70 Q-20,45 20,70 Q60,95 100,70 Q140,45 180,70 Q220,95 260,70 Q300,45 340,70"
                stroke="#8fd97f" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>
          <path d="M-60,70 Q-20,45 20,70 Q60,95 100,70 Q140,45 180,70 Q220,95 260,70 Q300,45 340,70"
                stroke="#c8f0a0" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- Head -->
          <ellipse cx="344" cy="69" rx="14" ry="10" fill="#6abf5e"/>

          <circle cx="350" cy="65" r="4" fill="white"/>

          <circle cx="351.2" cy="64" r="0.8" fill="white"/>

          <path d="M357,69 L365,67 M365,67 L368,64 M365,67 L368,70" stroke="#e84040" stroke-width="1.5" fill="none" stroke-linecap="round">
            <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite"/>
          </path>
          <!-- Spots -->
          <circle cx="80" cy="70" r="5" fill="#4a9f3e" opacity="0.4"/>
          <circle cx="180" cy="70" r="5" fill="#4a9f3e" opacity="0.4"/>
          <circle cx="280" cy="70" r="5" fill="#4a9f3e" opacity="0.4"/>
          <!-- Slither animation -->
          <animateTransform attributeName="transform" type="translate" values="0,0;12,0;0,0" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
        </g>

        <!-- Snake 2 - orange, going other direction -->
        <g id="snake2">
          <path d="M760,50 Q720,25 680,50 Q640,75 600,50 Q560,25 520,50 Q480,75 440,50 Q400,25 360,50"
                stroke="#f0a030" stroke-width="11" fill="none" stroke-linecap="round"/>
          <path d="M760,50 Q720,25 680,50 Q640,75 600,50 Q560,25 520,50 Q480,75 440,50 Q400,25 360,50"
                stroke="#ffc85a" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
          <path d="M760,50 Q720,25 680,50 Q640,75 600,50 Q560,25 520,50 Q480,75 440,50 Q400,25 360,50"
                stroke="#ffe8a0" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- Head -->

          <ellipse cx="356" cy="50" rx="9" ry="5.5" fill="#ffc85a" opacity="0.5"/>

          <circle cx="350" cy="46" r="3.5" fill="white"/>

          <path d="M343,50 L335,48 M335,48 L332,45 M335,48 L332,51" stroke="#e84040" stroke-width="1.5" fill="none" stroke-linecap="round">

          <text x="407" y="81" font-size="7" fill="#333" font-weight="bold">◕</text>

          <path d="M398,76 Q394,72 391,75 Q394,78 398,76Z" fill="#e8637a"/>
          <path d="M398,76 Q402,72 405,75 Q402,78 398,76Z" fill="#e8637a"/>

          <animateTransform attributeName="transform" type="translate" values="0,0;10,0;0,0" dur="2.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>

</div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Falling petals
  const petalColors = ['#f4b8c4','#e8637a','#c5aede','#f9d4dc','#fce8ef','#ffb3c6','#d4c0ea'];
  const rain = document.getElementById('petalRain');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 8 + Math.random() * 14;
    p.style.cssText = `
      left: ${Math.random()*100}%;
      width: ${size}px;
      height: ${size * 0.65}px;
      background: ${petalColors[Math.floor(Math.random()*petalColors.length)]};
      animation-duration: ${5 + Math.random()*8}s;
      animation-delay: ${Math.random()*8}s;
      transform: rotate(${Math.random()*360}deg);
    `;
    rain.appendChild(p);
  }

  // Floating hearts
  const heartsLayer = document.getElementById('heartsLayer');
  const heartEmojis = ['🌸','💕','✨','🌷','💖','🌺','⭐','🌸'];
  for (let i = 0; i < 12; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    h.style.cssText = `
      left: ${10 + Math.random()*80}%;
      bottom: ${Math.random()*30}px;
      animation-duration: ${4 + Math.random()*6}s;
      animation-delay: ${Math.random()*6}s;
      font-size: ${10 + Math.random()*8}px;
    `;
    heartsLayer.appendChild(h);
  }

  // Confetti burst on click
  const confettiColors = ['#e8637a','#c5aede','#c9973a','#8aab8a','#f4b8c4','#ffe066','#ffb3c6'];
  document.addEventListener('click', e => {
    for (let i = 0; i < 22; i++) {
      const conf = document.createElement('div');
      conf.className = 'confetti-piece';
      const angle = (Math.random() * 360) * Math.PI / 180;
      const dist = 60 + Math.random() * 120;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 80;
      const size = 5 + Math.random() * 8;
      conf.style.cssText = `
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        width: ${size}px; height: ${size}px;
        background: ${confettiColors[Math.floor(Math.random()*confettiColors.length)]};
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        --tx: ${tx}px;
        --ty: ${ty}px;
        animation-duration: ${0.6 + Math.random()*0.6}s;
      `;
      document.body.appendChild(conf);
      conf.addEventListener('animationend', () => conf.remove());
    }
  });
</script>
</body>
